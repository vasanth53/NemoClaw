name: Docs PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, closed]
    paths:
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs-preview-pr.yaml"

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event.action != 'closed'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        if: github.event.action != 'closed'
        uses: astral-sh/setup-uv@v4

      - name: Install doc dependencies
        if: github.event.action != 'closed'
        run: uv sync --group docs

      - name: Build documentation
        if: github.event.action != 'closed'
        run: uv run --group docs sphinx-build -W -b html docs docs/_build/html

      - name: Clean build artifacts
        if: github.event.action != 'closed'
        run: |
          find docs/_build -name .doctrees -prune -exec rm -rf {} \;
          find docs/_build -name .buildinfo -exec rm {} \;
          touch docs/_build/html/.nojekyll

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./docs/_build/html/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
