name: pr

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ruff
        run: uv tool install ruff

      - name: Install Node dependencies
        working-directory: nemoclaw
        run: npm install

      - name: Run all linters
        run: make check

  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Install and build TypeScript plugin
        working-directory: nemoclaw
        run: |
          npm install
          npm run build

      - name: Run root unit tests
        run: node --test --experimental-test-coverage test/*.test.js

      - name: Run TypeScript unit tests with coverage
        working-directory: nemoclaw
        run: npx vitest run --coverage

      - name: Check coverage ratchet
        run: bash scripts/check-coverage-ratchet.sh

  test-e2e-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sandbox test image
        run: docker build -f test/Dockerfile.sandbox -t nemoclaw-sandbox-test .

      - name: Run sandbox E2E tests
        run: docker run --rm -v "${{ github.workspace }}/test:/opt/test" nemoclaw-sandbox-test /opt/test/e2e-test.sh
